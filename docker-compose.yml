version: "3.8"

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    platform: linux/amd64   # ensures it works on Apple Silicon
    container_name: jambura_web
    volumes:
      - .:/var/www/html
    ports:
      - "8088:80"
    environment:
      APACHE_RUN_USER: www-data
      APACHE_RUN_GROUP: www-data
    depends_on:
      - db

  db:
    image: mysql:5.7
    platform: linux/amd64   # Apple Silicon fix
    container_name: jambura_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: jambura_db
      MYSQL_USER: jambura
      MYSQL_PASSWORD: jamburapass
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3366:3306"

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    platform: linux/amd64
    container_name: jambura_phpmyadmin
    restart: always
    depends_on:
      - db
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: rootpassword
    ports:
      - "8081:80"

# define volumes at the very bottom
volumes:
  db_data:
